<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Hors connexion — Paris Cuban Salsa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <link rel="icon" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #111; color: #fff; font-family: "DM Sans", system-ui, sans-serif; }
      body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
      .logo { width: 88px; height: 88px; border-radius: 50%; background: #F5C518; color: #111;
              display: flex; align-items: center; justify-content: center;
              font-family: "Playfair Display", serif; font-weight: 700; font-size: 28px; letter-spacing: -1px; }
      .overline { margin-top: 28px; font-size: 11px; letter-spacing: 2px; color: #F5C518; font-weight: 700; }
      h1 { font-family: "Playfair Display", serif; font-size: 32px; line-height: 1.1; margin-top: 12px; max-width: 480px; text-align: center; }
      h1 em { color: #F5C518; font-style: italic; font-weight: 400; }
      p { margin-top: 14px; max-width: 360px; text-align: center; color: #bbb; line-height: 1.5; }
      a {
        margin-top: 28px; display: inline-block; background: #F5C518; color: #111;
        font-family: "DM Sans", sans-serif; font-weight: 700;
        text-decoration: none; padding: 14px 24px; border-radius: 40px;
        letter-spacing: 1.4px; font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="logo">PCS</div>
    <div class="overline">PARIS CUBAN SALSA</div>
    <h1>Tu es <em>hors connexion</em>.</h1>
    <p>Reconnecte-toi pour voir les derniers events, soirées et fiches d'artistes.</p>
    <a href="/">Réessayer</a>
  </body>
</html>
